apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-collector
  namespace: argocd
  annotations:
    # After monitoring (kube-prometheus-stack is wave 4) so Prometheus is up.
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: git@github.com:petzkod5/rivendell-talos-cluster.git
    targetRevision: HEAD
    path: kubernetes/manifests/telemetry-collector
  destination:
    server: https://kubernetes.default.svc
    namespace: telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
