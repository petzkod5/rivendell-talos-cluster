apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: workloads
  source:
    repoURL: git@github.com:petzkod5/rivendell-talos-cluster.git
    targetRevision: main
    path: kubernetes/manifests/hermes
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  ignoreDifferences:
    # The Tailscale operator rewrites the egress Service's spec.externalName to a
    # headless proxy svc in ns tailscale. Don't let selfHeal revert that mutation.
    - group: ""
      kind: Service
      name: ubuntu-vm
      namespace: hermes
      jsonPointers:
        - /spec/externalName
    - group: ""
      kind: Service
      name: ollama
      namespace: hermes
      jsonPointers:
        - /spec/externalName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
