apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: networking
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 40.3.0
      helm:
        valueFiles:
          - $values/kubernetes/values/traefik.yaml
    - repoURL: git@github.com:petzkod5/rivendell-talos-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
