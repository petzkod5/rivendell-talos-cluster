apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    # Apply after cert-manager, cloudflare-ddns, and the ESO app have had a chance
    # to create their namespaces/controllers. Child Application sync waves do not
    # create hard dependencies, but this reduces first-sync races.
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: security
  source:
    repoURL: https://github.com/petzkod5/rivendell-talos-cluster.git
    targetRevision: main
    path: kubernetes/manifests/external-secrets-config
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
