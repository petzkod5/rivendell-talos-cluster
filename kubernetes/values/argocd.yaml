global:
  domain: argocd.home.local

configs:
  params:
    server.insecure: "true"
  cm:
    url: http://argocd.home.local
    oidc.config: |
      name: Authentik
      issuer: http://authentik.home.local/application/o/argocd/
      clientID: dwqTO2ZiLydjjOFzJaJAOToDpRIjDgPmuqIrphZD
      clientSecret: $oidc.authentik.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
  rbac:
    policy.default: role:admin

# Expose component metrics + ServiceMonitors so Prometheus scrapes ArgoCD.
# kube-prometheus-stack scrapes all ServiceMonitors cluster-wide
# (serviceMonitorSelectorNilUsesHelmValues: false), so these are auto-discovered.
# The application-controller exposes argocd_app_info (per-app name/sync/health),
# which drives the petzko.sh :system services list + ArgoCD status panel.
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
