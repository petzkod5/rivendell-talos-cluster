deployment:
  replicas: 1

service:
  type: LoadBalancer

api:
  dashboard: true
  insecure: true

ports:
  traefik:
    expose:
      default: true
  websecure:
    expose:
      default: true

providers:
  kubernetesGateway:
    enabled: true

gatewayClass:
  enabled: true
  name: traefik

gateway:
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All
    websecure:
      port: 8443
      protocol: HTTPS
      namespacePolicy:
        from: All
      certificateRefs:
        - name: petzko-sh-tls
          namespace: traefik

ingressRoute:
  dashboard:
    enabled: false
