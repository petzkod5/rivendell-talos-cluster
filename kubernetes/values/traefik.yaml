deployment:
  replicas: 1

service:
  type: LoadBalancer

api:
  dashboard: true
  insecure: true

ports:
  traefik:
    expose:
      default: true

providers:
  kubernetesGateway:
    enabled: true

gatewayClass:
  enabled: true
  name: traefik

gateway:
  listeners:
    web:
      namespacePolicy:
        from: All

ingressRoute:
  dashboard:
    enabled: false
