installCRDs: true

# Required by the Bitwarden Secrets Manager provider. ESO talks to this
# service over HTTPS and the ClusterSecretStore trusts the cert-manager CA
# written to the bitwarden-tls-certs Secret.
bitwarden-sdk-server:
  enabled: true
  image:
    tls:
      enabled: true
      secretName: bitwarden-tls-certs
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 256Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

certController:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
