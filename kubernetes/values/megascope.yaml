# megascope — auto-discovering cluster portal (github.com/petzkod5/megascope).
# The chart can create its own HTTPRoute, but it omits group/kind/weight on
# backendRefs, which the Gateway API webhook defaults in and ArgoCD then reports
# as drift. So we disable it here and ship a convention-correct raw HTTPRoute in
# kubernetes/manifests/megascope (internal `web` listener, scope.home.local).
config:
  clusterName: rivendell

httproute:
  enabled: false

# The chart's distroless image declares `USER nonroot` (a name, not a UID) while
# its default podSecurityContext sets runAsNonRoot without a numeric runAsUser,
# so the kubelet can't verify non-root and fails with CreateContainerConfigError.
# Pin distroless's nonroot UID/GID (65532); deep-merges with the chart defaults.
podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
