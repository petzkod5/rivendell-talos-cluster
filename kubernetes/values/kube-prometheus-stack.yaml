defaultRules:
  create: true
  rules:
    etcd: false               # Talos etcd requires special TLS config to scrape
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

# Disable scraping of Talos-managed control plane components that
# don't expose standard metrics endpoints. Avoids constant "target down" alerts.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

alertmanager:
  alertmanagerSpec:
    securityContext:
      fsGroup: 2000
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroupChangePolicy: "Always"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi

grafana:
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: browser

  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    server:
      root_url: http://grafana.home.local
    users:
      allow_sign_up: false
    auth:
      disable_login_form: false
    # Authentik OIDC — enable after creating an Authentik OIDC provider for Grafana
    # and creating the grafana-oidc secret in the monitoring namespace:
    #   kubectl create secret generic grafana-oidc -n monitoring \
    #     --from-literal=GF_AUTH_GENERIC_OAUTH_CLIENT_ID=<id> \
    #     --from-literal=GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=<secret>
    # Then set auth.generic_oauth.enabled: true and add envFromSecret: grafana-oidc
    auth.generic_oauth:
      enabled: false
      name: Authentik
      allow_sign_up: true
      scopes: openid profile email
      auth_url: http://authentik.home.local/application/o/authorize/
      token_url: http://authentik.home.local/application/o/token/
      api_url: http://authentik.home.local/application/o/userinfo/
      role_attribute_path: "contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'"

  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 28GiB

    # Scrape ALL ServiceMonitors/PodMonitors/ProbeMonitors across the cluster,
    # not just ones that match the helm release labels.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

    securityContext:
      fsGroup: 2000
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroupChangePolicy: "Always"

    initContainers:
      - name: fix-permissions
        image: busybox:1.28
        command: ["sh", "-c", "chown -R 1000:2000 /prometheus && chmod -R 775 /prometheus"]
        volumeMounts:
          - name: prometheus-kube-prometheus-stack-prometheus-db
            mountPath: /prometheus
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false

    # local-path: uses the control plane's 248GB disk. Metrics don't need
    # replication — if the node restarts, data is retained on local disk.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 4Gi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
