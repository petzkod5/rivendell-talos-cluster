alloy:
  # Logs-only for now. OTLP receiver gets added when Tempo lands.
  configMap:
    content: |-
      // File-based Kubernetes log collection.
      // Tails /var/log/pods CRI log files directly on the host. Labels are
      // extracted from the file path — more reliable than loki.source.kubernetes
      // (API-based) which does not forward discovery relabeled target labels.

      local.file_match "pods" {
        path_targets = [{__path__ = "/var/log/pods/*/*/*.log"}]
        sync_period  = "5s"
      }

      // Extract namespace, pod, container from the CRI log file path.
      // Path format: /var/log/pods/{namespace}_{pod}_{uid}/{container}/*.log
      // Namespace and pod names cannot contain underscores in Kubernetes, so
      // splitting on _ is unambiguous.
      discovery.relabel "pod_logs" {
        targets = local.file_match.pods.targets

        rule {
          source_labels = ["__path__"]
          regex         = "/var/log/pods/([^_/]+)_[^_/]+_[^/]+/[^/]+/.*"
          replacement   = "$1"
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__path__"]
          regex         = "/var/log/pods/[^_/]+_([^_/]+)_[^/]+/[^/]+/.*"
          replacement   = "$1"
          target_label  = "pod"
        }
        rule {
          source_labels = ["__path__"]
          regex         = "/var/log/pods/[^_/]+_[^_/]+_[^/]+/([^/]+)/.*"
          replacement   = "$1"
          target_label  = "container"
        }
      }

      loki.source.file "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.cri.receiver]
      }

      // Parse CRI log format: <timestamp> <stream> <flags> <message>
      // Sets the real stream label (stdout or stderr) and strips CRI prefixes.
      loki.process "cri" {
        forward_to = [loki.write.default.receiver]
        stage.cri {}
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

  clustering:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

  mounts:
    extra:
      - name: varlogpods
        mountPath: /var/log/pods
        readOnly: true

controller:
  type: daemonset
  volumes:
    extra:
      - name: varlogpods
        hostPath:
          path: /var/log/pods

# Self-metrics scraped via the chart's built-in ServiceMonitor
serviceMonitor:
  enabled: true

rbac:
  create: true

# No persistence — Alloy is stateless for log forwarding
