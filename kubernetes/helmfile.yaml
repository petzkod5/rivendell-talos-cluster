repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

# Bootstrap only — installs ArgoCD, which then manages all other infrastructure.
# On a fresh cluster: helmfile sync → ArgoCD up → ArgoCD installs metallb, traefik, itself.
releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 9.5.21
    values:
      - values/argocd.yaml

  - name: argocd-config
    namespace: argocd
    chart: ./charts/argocd-config
    needs:
      - argocd/argocd
