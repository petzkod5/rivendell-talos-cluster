repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

# Bootstrap only — installs ArgoCD, which then manages all other infrastructure.
# On a fresh cluster: helmfile sync → ArgoCD up → root App created → ArgoCD
# installs gateway-api-crds, metallb, traefik, and manages itself going forward.
releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 9.7.0
    values:
      - values/argocd.yaml
    hooks:
      - events: ["postsync"]
        command: kubectl
        args:
          - apply
          - -f
          - apps/root.yaml
