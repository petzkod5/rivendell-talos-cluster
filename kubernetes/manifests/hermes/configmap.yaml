apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
data:
  # Seeded into the data volume by the seed-config initContainer on first boot
  # only (never clobbers an existing config). Hermes/dashboard own config.yaml
  # afterwards, so model/tool changes made in the UI persist across restarts.
  config.yaml: |
    model:
      provider: openrouter
      default: nvidia/nemotron-3-nano-30b-a3b:free
      base_url: https://openrouter.ai/api/v1
      api_mode: chat_completions
    custom_providers:
      # Local Ollama on petzko-pc-01, reached via the hermes/ollama Tailscale
      # egress. Selectable in the model picker as custom:ollama; the model.*
      # default above is unchanged.
      - name: ollama
        base_url: http://ollama.hermes.svc.cluster.local:11434/v1
        api_key: ollama
        models:
          "qwen2.5-coder:14b":
            context_length: 32768
    terminal:
      backend: ssh
      cwd: /home/hermes/workspace
      persistent_shell: true
      ssh_host: ubuntu-vm.hermes.svc.cluster.local
      ssh_user: hermes
      ssh_port: 2222
      ssh_key: /opt/data/home/.ssh/id_ed25519
    approvals:
      mode: smart
      cron_mode: deny
    memory:
      memory_enabled: true
      user_profile_enabled: true
    sessions:
      auto_prune: true
