apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  # Single-writer SQLite state on an RWO volume — never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # Only the control-plane node has the RAM/disk headroom; the HP thin-client
      # worker is too small. local-path PVC binds wherever the pod lands.
      nodeSelector:
        kubernetes.io/hostname: talos-ca6-8kw
      # No pod-level runAsNonRoot: the image's s6-overlay /init starts as root to
      # chown the data volume, then drops every service to UID 10000. Enforcing
      # non-root at the k8s layer breaks startup. Namespace runs baseline PSS.
      initContainers:
        # Seed config.yaml into the data volume on first boot only. `cp` is guarded
        # by a test, so dashboard/CLI edits to config.yaml survive restarts.
        - name: seed-config
          image: docker.io/nousresearch/hermes-agent:v2026.6.19
          command:
            - sh
            - -c
            - |
              if [ ! -f /opt/data/config.yaml ]; then
                cp /seed/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml
              fi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: seed
              mountPath: /seed
        - name: seed-ssh-key
          image: docker.io/nousresearch/hermes-agent:v2026.6.19
          command:
            - sh
            - -c
            - |
              install -d -m 700 -o 10000 -g 10000 /opt/data/home/.ssh
              install -m 600 -o 10000 -g 10000 /ssh-secret/id_ed25519 /opt/data/home/.ssh/id_ed25519
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: ssh-key
              mountPath: /ssh-secret
              readOnly: true
        - name: seed-ssh-config
          image: docker.io/nousresearch/hermes-agent:v2026.6.19
          command:
            - /opt/hermes/.venv/bin/python3
            - -c
            - |
              import os, yaml
              p = "/opt/data/config.yaml"
              c = {}
              if os.path.exists(p):
                  with open(p) as f:
                      c = yaml.safe_load(f) or {}
              t = c.setdefault("terminal", {})
              t["backend"] = "ssh"
              t["cwd"] = "/home/hermes/workspace"
              t["persistent_shell"] = True
              with open(p, "w") as f:
                  yaml.safe_dump(c, f, default_flow_style=False, sort_keys=False)
              os.chown(p, 10000, 10000)
          volumeMounts:
            - name: data
              mountPath: /opt/data
        # Install + persist the Photon Node sidecar deps (spectrum-ts) onto the
        # PVC, since /opt/hermes is read-only/ephemeral in the image. Idempotent:
        # reinstalls only when the sidecar's package-lock.json changes. Never
        # fails the pod — on a failed install Photon is simply unavailable that
        # boot while the rest of the gateway (API/dashboard/model) stays up.
        - name: photon-sidecar
          image: docker.io/nousresearch/hermes-agent:v2026.6.19
          command:
            - sh
            - -c
            - |
              set -eu
              SIDE=/opt/hermes/plugins/platforms/photon/sidecar
              NM="$SIDE/node_modules"
              LOCK="$SIDE/package-lock.json"
              HASH="$(sha256sum "$LOCK" | awk '{print $1}')"
              if [ -f "$NM/.lockhash" ] && [ "$(cat "$NM/.lockhash" 2>/dev/null)" = "$HASH" ] && [ -d "$NM/spectrum-ts" ]; then
                echo "[photon-init] sidecar deps current"
              else
                echo "[photon-init] installing sidecar deps (spectrum-ts)"
                TMP="$(mktemp -d)"
                cp "$SIDE/package.json" "$LOCK" "$TMP/"
                if ( cd "$TMP" && HOME=/tmp npm_config_cache=/tmp/.npm npm ci --ignore-scripts --no-audit --no-fund ); then
                  find "$NM" -mindepth 1 -delete 2>/dev/null || true
                  cp -a "$TMP/node_modules/." "$NM/"
                  printf '%s' "$HASH" > "$NM/.lockhash"
                  echo "[photon-init] sidecar deps installed"
                elif [ -d "$NM/spectrum-ts" ]; then
                  echo "[photon-init] npm ci failed; keeping existing deps"
                else
                  echo "[photon-init] npm ci failed and no existing deps — photon unavailable this boot"
                fi
              fi
              chown -R 10000:10000 "$NM" 2>/dev/null || true
              # PHOTON_ALLOWED_USERS / PHOTON_ALLOW_ALL_USERS are managed via the
              # hermes-secrets Secret. The user .env loads with override=True
              # (hermes_cli/env_loader.py:238) and would shadow the Secret, so
              # strip those keys from .env. Leaves PHOTON_PROJECT_ID/SECRET/
              # HOME_CHANNEL intact.
              if [ -f /opt/data/.env ]; then
                sed -i '/^[[:space:]]*PHOTON_ALLOWED_USERS[[:space:]]*=/d; /^[[:space:]]*PHOTON_ALLOW_ALL_USERS[[:space:]]*=/d' /opt/data/.env
                chown 10000:10000 /opt/data/.env 2>/dev/null || true
              fi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: data
              mountPath: /opt/hermes/plugins/platforms/photon/sidecar/node_modules
              subPath: photon-sidecar-node-modules
      containers:
        - name: hermes
          image: docker.io/nousresearch/hermes-agent:v2026.6.19
          # Single supervised process tree: gateway + OpenAI-compatible API server
          # (8642) + web dashboard (9119), all under s6 with crash auto-restart.
          args:
            - gateway
            - run
          envFrom:
            - secretRef:
                name: hermes-secrets
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: API_SERVER_PORT
              value: "8642"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: TERMINAL_ENV
              value: ssh
            - name: TERMINAL_SSH_HOST
              value: ubuntu-vm.hermes.svc.cluster.local
            - name: TERMINAL_SSH_USER
              value: hermes
            - name: TERMINAL_SSH_KEY
              value: /opt/data/home/.ssh/id_ed25519
            - name: TERMINAL_SSH_PORT
              value: "22"
            - name: TERMINAL_SSH_PERSISTENT
              value: "true"
            - name: TERMINAL_CWD
              value: /home/hermes/workspace
          ports:
            - name: api
              containerPort: 8642
            - name: dashboard
              containerPort: 9119
          startupProbe:
            httpGet:
              path: /health
              port: 8642
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: dshm
              mountPath: /dev/shm
            - name: data
              mountPath: /opt/hermes/plugins/platforms/photon/sidecar/node_modules
              subPath: photon-sidecar-node-modules
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: seed
          configMap:
            name: hermes-config
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: ssh-key
          secret:
            secretName: hermes-ssh-key
            defaultMode: 0400
