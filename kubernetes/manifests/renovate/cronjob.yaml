apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  annotations:
    ignore-check.kube-linter.io/no-read-only-root-fs: "Renovate containerbase installs runtime tools while updating lockfiles, so the image filesystem must remain writable."
spec:
  # Every hour. Renovate opens/updates PRs against the configured repos; CI
  # validates them and low-risk ones automerge (Renovate self-merges green PRs
  # on each run, so a tighter cadence = timelier merges).
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            # Makes the emptyDir group-writable for whatever uid the image uses.
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43
              # Repos to process (autodiscover off — explicit list).
              args:
                - petzkod5/rivendell-talos-cluster
              env:
                - name: RENOVATE_PLATFORM
                  value: github
                - name: RENOVATE_AUTODISCOVER
                  value: "false"
                - name: RENOVATE_GIT_AUTHOR
                  value: "Renovate Bot <renovate@petzko.sh>"
                - name: LOG_LEVEL
                  value: info
                # Keep all writes on the writable tmpfs (root FS is read-only).
                - name: HOME
                  value: /tmp
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                # GitHub PAT (repo + workflow scopes), managed by External
                # Secrets Operator from Bitwarden Secret Manager.
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate
                      key: token
              securityContext:
                allowPrivilegeEscalation: false
                # Renovate's containerbase installs tools (node/npm) to the
                # image FS at runtime to update lockfiles, so the root FS must be
                # writable. Other hardening (non-root, dropped caps, seccomp,
                # no-privilege-escalation) is kept.
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  # 1Gi OOM-killed while updating lockfiles across a large
                  # backlog; the node has ample headroom.
                  memory: 3Gi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
