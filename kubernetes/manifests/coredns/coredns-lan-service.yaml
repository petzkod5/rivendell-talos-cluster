apiVersion: v1
kind: Service
metadata:
  name: coredns-lan
  namespace: kube-system
  annotations:
    # Reachable over the tailnet via the lan-subnet-router Connector so remote
    # devices can resolve *.home.local through this CoreDNS instance.
    metallb.universe.tf/loadBalancerIPs: 192.168.0.227
spec:
  type: LoadBalancer
  selector:
    k8s-app: kube-dns
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
