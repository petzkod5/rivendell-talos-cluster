apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: megascope
  namespace: megascope
  # app.megascope.io/* annotations let megascope discover and brand its own tile.
  annotations:
    app.megascope.io/name: Megascope
    app.megascope.io/group: Platform
    app.megascope.io/icon: "◎"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - scope.home.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: megascope
          port: 80
          weight: 1
