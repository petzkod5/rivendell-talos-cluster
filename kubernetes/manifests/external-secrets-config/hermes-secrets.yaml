apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: hermes-secrets
    creationPolicy: Merge
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: API_SERVER_KEY
      remoteRef:
        key: c0c15df1-823c-44c5-b83a-b477012142ac # gitleaks:allow -- Bitwarden secret UUID identifier, not the secret value.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: 359c1605-1fc3-48c4-9703-b477012142c6 # gitleaks:allow -- Bitwarden secret UUID identifier, not the secret value.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PHOTON_ALLOWED_USERS
      remoteRef:
        key: c278bd30-da55-44d7-aea4-b477012142e6 # gitleaks:allow -- Bitwarden secret UUID identifier, not the secret value.
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
