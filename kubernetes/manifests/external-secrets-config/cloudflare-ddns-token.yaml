apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cloudflare-ddns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Merge
    deletionPolicy: Retain
    template:
      metadata:
        annotations:
          # ESO creates the target Secret from this ExternalSecret. Because ESO
          # copies ArgoCD's tracking annotation from the ExternalSecret to the
          # generated Secret, tell ArgoCD not to treat the generated Secret as
          # unmanaged drift in this app.
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: api-token
      remoteRef:
        # Stable Bitwarden Secrets Manager ID for:
        # k8s/cloudflare-ddns/cloudflare-api-token/api-token
        key: 031ac2aa-ece9-4dcd-9066-b47701214211 # gitleaks:allow -- Bitwarden secret UUID identifier, not the secret value.
