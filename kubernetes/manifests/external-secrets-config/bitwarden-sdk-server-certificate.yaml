apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: bitwarden-sdk-server-selfsigned
  namespace: external-secrets
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-server-ca
  namespace: external-secrets
spec:
  isCA: true
  commonName: bitwarden-sdk-server-ca
  secretName: bitwarden-sdk-server-ca
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: bitwarden-sdk-server-selfsigned
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: bitwarden-sdk-server-ca
  namespace: external-secrets
spec:
  ca:
    secretName: bitwarden-sdk-server-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-server
  namespace: external-secrets
spec:
  secretName: bitwarden-tls-certs
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - bitwarden-sdk-server
    - bitwarden-sdk-server.external-secrets
    - bitwarden-sdk-server.external-secrets.svc
    - bitwarden-sdk-server.external-secrets.svc.cluster.local
  issuerRef:
    name: bitwarden-sdk-server-ca
    kind: Issuer
    group: cert-manager.io
